name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: ghstprtcl-aarch64-apple-darwin.tar.gz
            binary: ghstprtcl
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: ghstprtcl-x86_64-unknown-linux-gnu.tar.gz
            binary: ghstprtcl
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: ghstprtcl-x86_64-pc-windows-msvc.zip
            binary: ghstprtcl.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} --bin ghstprtcl

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          tar -C dist -czf "${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Attest package provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.archive }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum ghstprtcl-* > SHA256SUMS

      - name: Sign checksums
        shell: bash
        env:
          RELEASE_SIGNING_KEY_B64: ${{ secrets.GHSTPRTCL_RELEASE_SIGNING_KEY_B64 }}
        run: |
          if [ -z "$RELEASE_SIGNING_KEY_B64" ]; then
            echo "Missing GHSTPRTCL_RELEASE_SIGNING_KEY_B64 secret" >&2
            exit 1
          fi
          printf '%s' "$RELEASE_SIGNING_KEY_B64" | base64 -d > release-signing-private.pem
          chmod 600 release-signing-private.pem
          openssl dgst -sha256 -sign release-signing-private.pem -out dist/SHA256SUMS.sig dist/SHA256SUMS
          rm -f release-signing-private.pem

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/ghstprtcl-*
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
          generate_release_notes: true
